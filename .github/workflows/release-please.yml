name: Release Please

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '_bmad-output/**'
      - 'LICENSE'
      - 'COPYING'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE/**'
      - '.github/release-notes-template.md'
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false  # Never cancel release-please runs

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Step 1: Run the full build + test pipeline first
  validate:
    name: Validate Build
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/build.yml

  # Step 2: Only create/update Release PR if build passes
  release-please:
    permissions:
      contents: write
      pull-requests: write
      actions: write
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch release build
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trigger artifact build for release
        if: ${{ steps.release.outputs.release_created }}
        run: gh workflow run release.yml --ref "${{ steps.release.outputs.tag_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
