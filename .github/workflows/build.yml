name: Build

on:
  pull_request:
    branches: [main]
  workflow_call:  # Called by release-please.yml on push to main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Test (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat test --no-daemon --no-configuration-cache --continue

      - name: Publish Unit Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/reports/spotbugs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        run: ./gradlew :freemind:jacocoTestReport --no-daemon --no-configuration-cache -x test

      - name: Upload Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: freemind/build/reports/jacoco/
          retention-days: 14

      - name: Upload build artifacts
        if: matrix.java == '21'
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            freemind/build/libs/*.jar
            freemind/build/distributions/*
          retention-days: 14
          if-no-files-found: warn

  gui-tests:
    name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: GUI Tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat testGui --no-daemon --no-configuration-cache --continue

      - name: E2E Showcase Screenshots (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :freemind:showcaseScreenshots --no-daemon --no-configuration-cache
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload GUI Test Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gui-test-screenshots-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/test-screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Embed Showcase & Test Screenshots in Job Summary
        if: always()
        shell: bash
        run: |
          # === SHOWCASE SCREENSHOTS (full-size, at the top) ===
          SHOWCASE_DIR="freemind/build/test-screenshots/showcase"
          if [ -d "$SHOWCASE_DIR" ]; then
            SHOWCASE_IMAGES=$(find "$SHOWCASE_DIR" -name "*.png" -type f | sort)
            if [ -n "$SHOWCASE_IMAGES" ]; then
              SCOUNT=$(echo "$SHOWCASE_IMAGES" | wc -l | tr -d ' ')
              echo "# E2E Showcase: FreeMind CE Running on ${{ matrix.os }} (Java ${{ matrix.java }})" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "> Full desktop screenshots proving end-to-end functionality with real mindmap files." >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              for IMG in $SHOWCASE_IMAGES; do
                BASENAME=$(basename "$IMG" .png)
                echo "## $BASENAME" >> "$GITHUB_STEP_SUMMARY"
                BASE64=$(base64 -w 0 "$IMG" 2>/dev/null || base64 "$IMG")
                echo "<img src=\"data:image/png;base64,$BASE64\" alt=\"$BASENAME\" width=\"100%\">" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
              done
              echo "---" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          # === GUI TEST SCREENSHOTS (collapsible, below showcase) ===
          SCREENSHOT_DIR="freemind/build/test-screenshots"
          if [ ! -d "$SCREENSHOT_DIR" ]; then
            echo "No screenshot directory found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Exclude showcase directory from test screenshots
          IMAGES=$(find "$SCREENSHOT_DIR" -name "*.png" -type f -not -path "*/showcase/*" | sort)
          if [ -z "$IMAGES" ]; then
            echo "No test screenshots were captured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          COUNT=$(echo "$IMAGES" | wc -l | tr -d ' ')
          echo "## GUI Test Screenshots ($COUNT images)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Click to expand all test screenshots</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for IMG in $IMAGES; do
            BASENAME=$(basename "$IMG" .png)
            echo "### $BASENAME" >> "$GITHUB_STEP_SUMMARY"
            BASE64=$(base64 -w 0 "$IMG" 2>/dev/null || base64 "$IMG")
            echo "<img src=\"data:image/png;base64,$BASE64\" alt=\"$BASENAME\" width=\"700\">" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GUI Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/testGui/*.xml
          reporter: java-junit
          fail-on-empty: false
