name: Build

on:
  pull_request:
    branches: [main]
  workflow_call:  # Called by release-please.yml on push to main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check for code changes
        id: check
        run: |
          # Push to main ve workflow_call (release akışı) → her zaman full build
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Non-PR event, running full build"
            exit 0
          fi
          # PR: doc-only mı kontrol et
          # Use merge-base to compare only the PR's own changes,
          # not commits merged into main since the branch was created.
          BASE=$(git merge-base "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "::notice::Comparing $BASE..$HEAD (merge-base)"
          # List non-doc files changed in this PR
          NON_DOC_FILES=$(git diff --name-only "$BASE..$HEAD" -- \
            ':!**/*.md' ':!docs/**' \
            ':!LICENSE' ':!COPYING' ':!.gitattributes' \
            ':!.github/ISSUE_TEMPLATE/**' ':!.github/PULL_REQUEST_TEMPLATE/**' \
            ':!.github/release-notes-template.md')
          if [ -z "$NON_DOC_FILES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Documentation-only change — skipping build & test matrix"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Code changes detected: $(echo "$NON_DOC_FILES" | wc -l | tr -d ' ') non-doc files"
            echo "$NON_DOC_FILES" | head -10
          fi

  build:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    name: Build (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Test (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat test --no-daemon --no-configuration-cache --continue

      - name: Test Count Regression Guard
        if: always()
        shell: bash
        run: |
          # Minimum expected headless test count (update when adding tests)
          MIN_TESTS=800
          RESULTS_DIR="freemind/build/test-results/test"
          if [ ! -d "$RESULTS_DIR" ]; then
            echo "::warning::No test results directory found — skipping count check"
            exit 0
          fi
          # Count tests from JUnit XML: <testcase> elements
          ACTUAL=$(grep -r '<testcase ' "$RESULTS_DIR"/*.xml 2>/dev/null | wc -l | tr -d ' ')
          echo "Test count: $ACTUAL (minimum: $MIN_TESTS)"
          if [ "$ACTUAL" -lt "$MIN_TESTS" ]; then
            echo "::error::Test count regression! Found $ACTUAL tests, expected >= $MIN_TESTS"
            exit 1
          fi
          echo "Test count OK: $ACTUAL >= $MIN_TESTS"

      - name: Publish Unit Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v2
        if: always()
        with:
          name: Unit Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: spotbugs-report-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/reports/spotbugs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        run: ./gradlew :freemind:jacocoTestReport --no-daemon --no-configuration-cache -x test

      - name: Enforce Coverage Threshold
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        run: ./gradlew :freemind:jacocoTestCoverageVerification --no-daemon --no-configuration-cache -x test

      - name: Upload Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: freemind/build/reports/jacoco/
          retention-days: 14

      - name: Upload build artifacts
        if: matrix.java == '21'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: build-${{ matrix.os }}
          path: |
            freemind/build/libs/*.jar
            freemind/build/distributions/*
          retention-days: 14
          if-no-files-found: warn

  gui-tests:
    name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
    needs: [changes, build]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: GUI Tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat testGui --no-daemon --no-configuration-cache --continue

      - name: E2E Showcase Screenshots (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :freemind:showcaseScreenshots --no-daemon --no-configuration-cache
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload GUI Test Screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: gui-test-screenshots-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/test-screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Screenshot Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Screenshots: ${{ matrix.os }} / Java ${{ matrix.java }}"
            echo ""

            # Showcase screenshots
            SHOWCASE_DIR="freemind/build/test-screenshots/showcase"
            if [ -d "$SHOWCASE_DIR" ]; then
              WINDOW_COUNT=$(find "$SHOWCASE_DIR" -name "window_*.jpg" -type f | wc -l | tr -d ' ')
              DESKTOP_COUNT=$(find "$SHOWCASE_DIR" -name "desktop_*.png" -type f | wc -l | tr -d ' ')
              echo "### E2E Showcase"
              echo "| Type | Count |"
              echo "|------|-------|"
              echo "| Window screenshots (JPEG) | $WINDOW_COUNT |"
              echo "| Desktop screenshots (PNG) | $DESKTOP_COUNT |"
              echo ""
              echo "Showcase files opened:"
              for IMG in $(find "$SHOWCASE_DIR" -name "window_*.jpg" -type f | sort); do
                NAME=$(basename "$IMG" .jpg | sed 's/window_showcase_//')
                SIZE=$(( $(wc -c < "$IMG") / 1024 ))
                echo "- **$NAME** (${SIZE} KB)"
              done
              echo ""
            fi

            # Test screenshots
            SCREENSHOT_DIR="freemind/build/test-screenshots"
            if [ -d "$SCREENSHOT_DIR" ]; then
              TEST_COUNT=$(find "$SCREENSHOT_DIR" -name "*.png" -type f -not -path "*/showcase/*" | wc -l | tr -d ' ')
              if [ "$TEST_COUNT" -gt 0 ]; then
                echo "### GUI Test Screenshots"
                echo "**$TEST_COUNT** test screenshots captured across all test classes."
                echo ""
              fi
            fi

            echo "> Download the **gui-test-screenshots** artifact to view all images."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GUI Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v2
        if: always()
        with:
          name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/testGui/*.xml
          reporter: java-junit
          fail-on-empty: false

  ci:
    name: CI
    if: always()
    needs: [changes, build, gui-tests, codeql]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Evaluate results
        run: |
          echo "Code changed: ${{ needs.changes.outputs.code }}"
          echo "Build: ${{ needs.build.result }}"
          echo "GUI Tests: ${{ needs.gui-tests.result }}"
          echo "CodeQL: ${{ needs.codeql.result }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more jobs were cancelled"
            exit 1
          fi
          echo "All checks passed"

  codeql:
    name: CodeQL Analysis
    needs: [changes, build]
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin', 'javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          category: "/language:${{ matrix.language }}"
