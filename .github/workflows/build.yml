name: Build

on:
  pull_request:
    branches: [main]
  workflow_call:  # Called by release-please.yml on push to main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }}, Java ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Test (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew test --no-daemon --no-configuration-cache --continue

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat test --no-daemon --no-configuration-cache --continue

      - name: Publish Unit Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Unit Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/reports/spotbugs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Generate Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        run: ./gradlew :freemind:jacocoTestReport --no-daemon --no-configuration-cache -x test

      - name: Upload Coverage Report
        if: matrix.os == 'ubuntu-24.04' && matrix.java == '21' && always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: freemind/build/reports/jacoco/
          retention-days: 14

      - name: Upload build artifacts
        if: matrix.java == '21'
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            freemind/build/libs/*.jar
            freemind/build/distributions/*
          retention-days: 14
          if-no-files-found: warn

  gui-tests:
    name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: GUI Tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat testGui --no-daemon --no-configuration-cache --continue

      - name: E2E Showcase Screenshots (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :freemind:showcaseScreenshots --no-daemon --no-configuration-cache
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload GUI Test Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gui-test-screenshots-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/test-screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Embed Showcase & Test Screenshots in Job Summary
        if: always()
        shell: bash
        run: |
          encode_base64() {
            base64 -w 0 "$1" 2>/dev/null || base64 -i "$1"
          }

          echo "::group::Screenshot Summary Debug"
          echo "GITHUB_STEP_SUMMARY=$GITHUB_STEP_SUMMARY"

          # === SHOWCASE SCREENSHOTS ===
          SHOWCASE_DIR="freemind/build/test-screenshots/showcase"
          if [ -d "$SHOWCASE_DIR" ]; then
            SHOWCASE_IMAGES=$(find "$SHOWCASE_DIR" -name "window_*.jpg" -type f | sort | head -3)
            TOTAL=$(find "$SHOWCASE_DIR" \( -name "*.png" -o -name "*.jpg" \) -type f | wc -l | tr -d ' ')
            echo "Found $TOTAL total showcase files, embedding up to 3 window JPEGs"
            if [ -n "$SHOWCASE_IMAGES" ]; then
              {
                echo "# E2E Showcase: FreeMind CE on ${{ matrix.os }} (Java ${{ matrix.java }})"
                echo ""
                echo "> Window screenshots of FreeMind CE with real mindmap files. All $TOTAL screenshots in **gui-test-screenshots** artifact."
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
              for IMG in $SHOWCASE_IMAGES; do
                FSIZE=$(wc -c < "$IMG" | tr -d ' ')
                echo "  Embedding: $IMG ($FSIZE bytes)"
                BASENAME=$(basename "$IMG" .jpg)
                BASE64=$(encode_base64 "$IMG")
                B64LEN=${#BASE64}
                echo "  Base64 length: $B64LEN chars (~$((B64LEN / 1024)) KB)"
                {
                  echo "## $BASENAME"
                  echo "<img src=\"data:image/jpeg;base64,$BASE64\" alt=\"$BASENAME\" width=\"100%\">"
                  echo ""
                } >> "$GITHUB_STEP_SUMMARY"
              done
              echo "---" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No showcase directory found at $SHOWCASE_DIR"
          fi

          # === GUI TEST SCREENSHOTS (count only) ===
          SCREENSHOT_DIR="freemind/build/test-screenshots"
          if [ -d "$SCREENSHOT_DIR" ]; then
            TEST_IMAGES=$(find "$SCREENSHOT_DIR" -name "*.png" -type f -not -path "*/showcase/*" | sort)
            if [ -n "$TEST_IMAGES" ]; then
              COUNT=$(echo "$TEST_IMAGES" | wc -l | tr -d ' ')
              echo "Found $COUNT test screenshots"
              {
                echo ""
                echo "## GUI Test Screenshots"
                echo ""
                echo "$COUNT test screenshots captured. Download the **gui-test-screenshots** artifact to view all."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          FINAL_SIZE=$(wc -c < "$GITHUB_STEP_SUMMARY" 2>/dev/null | tr -d ' ' || echo 0)
          echo "Final summary size: $FINAL_SIZE bytes ($((FINAL_SIZE / 1024)) KB)"
          echo "::endgroup::"

      - name: Publish GUI Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
          path: freemind/build/test-results/testGui/*.xml
          reporter: java-junit
          fail-on-empty: false
