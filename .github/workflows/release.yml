name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  JAVA_VERSION: '21'

jobs:
  build-and-package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: FreeMindCE-macOS
            package_task: jpackageMac
            artifact_pattern: freemind/build/jpackage/*.dmg
          - os: windows-latest
            artifact_name: FreeMindCE-Windows
            package_task: jpackageWin
            artifact_pattern: freemind/build/jpackage/*.exe
          - os: ubuntu-latest
            artifact_name: FreeMindCE-Linux
            package_task: jpackageLinux
            artifact_pattern: freemind/build/jpackage/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build --no-daemon --no-configuration-cache

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :freemind:${{ matrix.package_task }} --no-daemon --no-configuration-cache

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :freemind:${{ matrix.package_task }} --no-daemon --no-configuration-cache

      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: warn

      - name: Upload JAR distribution
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: FreeMindCE-jar
          path: freemind/build/distributions/*

  release:
    name: Create GitHub Release
    needs: build-and-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
