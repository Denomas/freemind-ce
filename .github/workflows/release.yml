name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.2.0) — only needed for manual runs'
        required: false

permissions: read-all

env:
  JAVA_VERSION: '21'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Gate 1: Run full build + tests on all platforms and Java versions
  validate:
    name: Validate (${{ matrix.os }}, Java ${{ matrix.java }})
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true  # Stop all if any platform/java combo fails

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Build + Test (Linux)
        if: runner.os == 'Linux'
        run: |
          ./gradlew build -x test --no-daemon --no-configuration-cache
          xvfb-run ./gradlew test --no-daemon --no-configuration-cache

      - name: Build + Test (macOS)
        if: runner.os == 'macOS'
        run: |
          ./gradlew build -x test --no-daemon --no-configuration-cache
          ./gradlew test --no-daemon --no-configuration-cache

      - name: Build + Test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\gradlew.bat build -x test --no-daemon --no-configuration-cache
          .\gradlew.bat test --no-daemon --no-configuration-cache

  # Gate 2: Run GUI tests on all platforms and Java versions
  gui-tests:
    name: GUI Tests (${{ matrix.os }}, Java ${{ matrix.java }})
    permissions:
      contents: read
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04, windows-2025, windows-2022, macos-15, macos-14]
        java: ['21', '22', '23', '24']
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: GUI Tests (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew testGui --no-daemon --no-configuration-cache --continue

      - name: GUI Tests (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat testGui --no-daemon --no-configuration-cache --continue

      - name: E2E Showcase Screenshots (Linux with Xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (macOS)
        if: runner.os == 'macOS'
        run: ./gradlew :freemind:showcaseScreenshots --no-daemon --no-configuration-cache || true
        timeout-minutes: 5

      - name: E2E Showcase Screenshots (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :freemind:showcaseScreenshots --no-daemon --no-configuration-cache
        timeout-minutes: 5
        continue-on-error: true

      - name: Upload GUI Test Screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-gui-screenshots-${{ matrix.os }}-java${{ matrix.java }}
          path: freemind/build/test-screenshots/
          retention-days: 30
          if-no-files-found: ignore

      - name: Screenshot Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Screenshots: ${{ matrix.os }} / Java ${{ matrix.java }}"
            echo ""

            # Showcase screenshots
            SHOWCASE_DIR="freemind/build/test-screenshots/showcase"
            if [ -d "$SHOWCASE_DIR" ]; then
              WINDOW_COUNT=$(find "$SHOWCASE_DIR" -name "window_*.jpg" -type f | wc -l | tr -d ' ')
              DESKTOP_COUNT=$(find "$SHOWCASE_DIR" -name "desktop_*.png" -type f | wc -l | tr -d ' ')
              echo "### E2E Showcase"
              echo "| Type | Count |"
              echo "|------|-------|"
              echo "| Window screenshots (JPEG) | $WINDOW_COUNT |"
              echo "| Desktop screenshots (PNG) | $DESKTOP_COUNT |"
              echo ""
              echo "Showcase files opened:"
              for IMG in $(find "$SHOWCASE_DIR" -name "window_*.jpg" -type f | sort); do
                NAME=$(basename "$IMG" .jpg | sed 's/window_showcase_//')
                SIZE=$(( $(wc -c < "$IMG") / 1024 ))
                echo "- **$NAME** (${SIZE} KB)"
              done
              echo ""
            fi

            # Test screenshots
            SCREENSHOT_DIR="freemind/build/test-screenshots"
            if [ -d "$SCREENSHOT_DIR" ]; then
              TEST_COUNT=$(find "$SCREENSHOT_DIR" -name "*.png" -type f -not -path "*/showcase/*" | wc -l | tr -d ' ')
              if [ "$TEST_COUNT" -gt 0 ]; then
                echo "### GUI Test Screenshots"
                echo "**$TEST_COUNT** test screenshots captured across all test classes."
                echo ""
              fi
            fi

            echo "> Download the **release-gui-screenshots** artifact to view all images."
          } >> "$GITHUB_STEP_SUMMARY"

  # Packaging — only runs after ALL validate + GUI tests pass
  build-macos:
    name: Package (macOS)
    permissions:
      contents: read
    needs: [validate, gui-tests]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Package DMG
        run: ./gradlew :freemind:jpackageMac --no-daemon --no-configuration-cache

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd freemind/build/jpackage
          for f in *.dmg; do [ -f "$f" ] && mv "$f" "FreeMind-CE-${VERSION}-macOS.dmg"; done

      - name: Upload packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: FreeMindCE-macOS
          path: freemind/build/jpackage/FreeMind-CE-*
          if-no-files-found: error

  build-windows:
    name: Package (Windows)
    permissions:
      contents: read
    needs: [validate, gui-tests]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Build
        run: .\gradlew.bat build -x test --no-daemon --no-configuration-cache

      - name: Package EXE
        run: .\gradlew.bat :freemind:jpackageWin --no-daemon --no-configuration-cache

      - name: Package MSI
        run: .\gradlew.bat :freemind:jpackageWinMsi --no-daemon --no-configuration-cache

      - name: Create portable archive (ZIP for Windows)
        shell: bash
        run: |
          ./gradlew.bat :freemind:installDist --no-daemon --no-configuration-cache
          VERSION="${GITHUB_REF_NAME#v}"

          # Add a Windows-friendly launcher to the portable distribution
          cat > freemind/build/install/freemind/freemind.bat << 'LAUNCHER'
          @echo off
          setlocal

          :: Try JAVA_HOME first
          if defined JAVA_HOME (
              set "JAVA_CMD=%JAVA_HOME%\bin\java.exe"
              if exist "%JAVA_CMD%" goto :run
          )

          :: Try java on PATH
          where java >nul 2>&1
          if %errorlevel% equ 0 (
              set "JAVA_CMD=java"
              goto :run
          )

          echo.
          echo ERROR: Java not found.
          echo Please install Java 21 or later from https://adoptium.net
          echo or set the JAVA_HOME environment variable.
          echo.
          pause
          exit /b 1

          :run
          :: Check Java version (--add-opens requires Java 9+, FreeMind CE requires 21+)
          for /f "tokens=3" %%v in ('"%JAVA_CMD%" -version 2^>^&1 ^| findstr /i "version"') do (
              set "JAVA_VER=%%~v"
          )
          for /f "tokens=1 delims=." %%m in ("%JAVA_VER%") do set "JAVA_MAJOR=%%m"
          if %JAVA_MAJOR% LSS 21 (
              echo.
              echo ERROR: Java %JAVA_VER% is too old. FreeMind CE requires Java 21 or later.
              echo Your current Java: "%JAVA_CMD%"
              echo Please install Java 21+ from https://adoptium.net
              echo.
              pause
              exit /b 1
          )

          set "APP_DIR=%~dp0"
          "%JAVA_CMD%" -Xms64m -Xmx512m -Xss8M ^
              --add-opens=java.desktop/java.awt=ALL-UNNAMED ^
              --add-opens=java.desktop/java.awt.event=ALL-UNNAMED ^
              --add-opens=java.desktop/javax.swing=ALL-UNNAMED ^
              --add-opens=java.desktop/javax.swing.text=ALL-UNNAMED ^
              --add-opens=java.base/java.lang=ALL-UNNAMED ^
              --add-opens=java.base/java.util=ALL-UNNAMED ^
              -cp "%APP_DIR%lib\*" freemind.main.FreeMindStarter %*
          LAUNCHER

          cat > freemind/build/install/freemind/README.txt << 'README'
          FreeMind CE — Portable Edition
          ==============================

          NOTE: Most users should install the EXE or MSI installer instead.
          Those installers bundle Java and work without any extra setup.
          The portable edition is for advanced users who manage their own Java.

          Requirements:
            Java 21 or later (https://adoptium.net)
            The standard Java from java.com is version 8 and will NOT work.

          Usage:
            Double-click freemind.bat or run it from Command Prompt.

          If Java is installed but not on your PATH, set JAVA_HOME:
            set JAVA_HOME=C:\Program Files\Eclipse Adoptium\jdk-21
            freemind.bat
          README

          # Bundle doc/ at root level for portable (getFreemindBaseDir strips "lib")
          cp -r freemind/doc freemind/build/install/freemind/doc
          # Remove jpackage-specific lib/doc/ to avoid double-bundling
          rm -rf freemind/build/install/freemind/lib/doc
          ls freemind/build/install/freemind/doc/freemind.mm || { echo "ERROR: doc/freemind.mm not found"; exit 1; }

          cd freemind/build/install
          powershell -Command "Compress-Archive -Path 'freemind\*' -DestinationPath '..\jpackage\FreeMind-CE-${VERSION}-Windows-portable.zip'"

      - name: Rename artifacts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd freemind/build/jpackage
          for f in *.exe; do [ -f "$f" ] && mv "$f" "FreeMind-CE-${VERSION}-Windows.exe"; done
          for f in *.msi; do [ -f "$f" ] && mv "$f" "FreeMind-CE-${VERSION}-Windows.msi"; done

      - name: Upload packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: FreeMindCE-Windows
          path: freemind/build/jpackage/FreeMind-CE-*
          if-no-files-found: error

  build-linux:
    name: Package (Linux)
    permissions:
      contents: read
    needs: [validate, gui-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Build
        run: ./gradlew build -x test --no-daemon --no-configuration-cache

      - name: Package DEB
        run: ./gradlew :freemind:jpackageLinux --no-daemon --no-configuration-cache

      - name: Package RPM
        run: ./gradlew :freemind:jpackageLinuxRpm --no-daemon --no-configuration-cache

      - name: Create portable archive (tar.gz for Linux)
        run: |
          ./gradlew :freemind:installDist --no-daemon --no-configuration-cache
          VERSION="${GITHUB_REF_NAME#v}"
          # Bundle doc/ at root level for portable (getFreemindBaseDir strips "lib")
          cp -r freemind/doc freemind/build/install/freemind/doc
          # Remove jpackage-specific lib/doc/ to avoid double-bundling
          rm -rf freemind/build/install/freemind/lib/doc
          ls freemind/build/install/freemind/doc/freemind.mm || { echo "ERROR: doc/freemind.mm not found"; exit 1; }
          cd freemind/build/install
          tar -czf "../jpackage/FreeMind-CE-${VERSION}-portable.tar.gz" freemind/

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Download appimagetool with checksum verification
          EXPECTED_SHA="b72d338a9a4969815a935b230512519990b5ed729821f1b27480e15d0ca64e36"
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          ACTUAL_SHA=$(sha256sum appimagetool | awk '{print $1}')
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::appimagetool checksum mismatch! Expected: $EXPECTED_SHA, Got: $ACTUAL_SHA"
            exit 1
          fi
          chmod +x appimagetool

          # Create AppDir structure from installed dist
          APPDIR="FreeMind-CE.AppDir"
          mkdir -p "${APPDIR}/usr/bin" "${APPDIR}/usr/lib" "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          # Copy application files
          cp -r freemind/build/install/freemind/lib/* "${APPDIR}/usr/lib/"

          # Create launcher script
          cat > "${APPDIR}/usr/bin/freemind-ce" << 'LAUNCHER'
          #!/bin/bash
          APPDIR="$(dirname "$(dirname "$(readlink -f "$0")")")"
          exec java -Xms64m -Xmx512m -cp "${APPDIR}/lib/*" freemind.main.FreeMindStarter "$@"
          LAUNCHER
          chmod +x "${APPDIR}/usr/bin/freemind-ce"

          # Copy desktop file and icon
          cp freemind/appimage/freemind-ce.desktop "${APPDIR}/"
          cp freemind/images/FreeMindWindowIcon.png "${APPDIR}/freemind-ce.png"
          cp freemind/images/FreeMindWindowIcon.png "${APPDIR}/usr/share/icons/hicolor/256x256/apps/freemind-ce.png"

          # Create AppRun
          cat > "${APPDIR}/AppRun" << 'APPRUN'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "${APPDIR}/usr/bin/freemind-ce" "$@"
          APPRUN
          chmod +x "${APPDIR}/AppRun"

          # Build AppImage
          ARCH=x86_64 ./appimagetool "${APPDIR}" "freemind/build/jpackage/FreeMind-CE-${VERSION}-Linux-x86_64.AppImage"

      - name: Rename artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd freemind/build/jpackage
          for f in *.deb; do [ -f "$f" ] && mv "$f" "FreeMind-CE-${VERSION}-Linux.deb"; done
          for f in *.rpm; do [ -f "$f" ] && mv "$f" "FreeMind-CE-${VERSION}-Linux.rpm"; done

      - name: Upload packages
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: FreeMindCE-Linux
          path: freemind/build/jpackage/FreeMind-CE-*
          if-no-files-found: error

      - name: Upload JAR distribution
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: FreeMindCE-jar
          path: freemind/build/distributions/*

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate SBOM
        run: |
          ./gradlew :freemind:cyclonedxBom --no-daemon --no-configuration-cache
          mkdir -p artifacts/sbom
          cp freemind/build/reports/bom.json artifacts/sbom/bom.json
          cp freemind/build/reports/bom.xml artifacts/sbom/bom.xml

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6107eb3a806d6a4a2688cc4b9842945a27f5d # v3.9.0

      - name: Sign release artifacts
        run: |
          cd artifacts
          for f in *; do
            if [ -f "$f" ] && [ "$f" != "SHA256SUMS.txt" ] && [ "$f" != "SHA256SUMS.txt.sig" ] && [ "$f" != "SHA256SUMS.txt.pem" ]; then
              cosign sign-blob --yes "$f" --output-signature="${f}.sig" --output-certificate="${f}.pem"
              echo "Signed: $f"
            fi
          done
          # Also sign the checksums file
          cosign sign-blob --yes SHA256SUMS.txt --output-signature=SHA256SUMS.txt.sig --output-certificate=SHA256SUMS.txt.pem

      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: |
            artifacts/FreeMind-CE-*
            artifacts/SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
