# FreeMind CE — FlatLaf Theme Properties
# Applied on top of FlatLightLaf/FlatDarkLaf defaults
# See: https://www.formdev.com/flatlaf/customizing/

# --- General ---
@accentColor = #4a90d9

# --- Component rounding ---
Button.arc = 6
Component.arc = 6
TextComponent.arc = 6

# --- Focus indicator ---
Component.focusWidth = 1
Component.innerFocusWidth = 1

# --- ScrollBar ---
ScrollBar.thumbArc = 999
ScrollBar.thumbInsets = 2,2,2,2
ScrollBar.track = lighten(@background, 3%)

# --- Menu ---
MenuItem.selectionArc = 6

# --- Tree (mind map node tree in left panel) ---
Tree.showDefaultIcons = false
Tree.paintLines = true

# --- TabbedPane ---
TabbedPane.showTabSeparators = true
TabbedPane.selectedBackground = @background
